[pytest]
# ── Output ────────────────────────────────────────────────────────────────────
# -v  : verbose (show each test name)
# -s  : don't capture stdout (so port detection table is always printed)
# --tb=short : concise tracebacks on failure
addopts = -v -s --tb=short

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests

# ── Markers ───────────────────────────────────────────────────────────────────
# (These are also registered in conftest.py; listing them here silences the
#  "PytestUnknownMarkWarning" that would otherwise appear.)
markers =
    serial:     requires physical UART serial port
    usb_serial: requires USB CDC serial port
    telnet:     requires device reachable on TCP 23
    http:       requires device HTTP server reachable
    network:    requires any network path (telnet or HTTP)
    ntp:        requires device NTP client

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = WARNING
log_file      = test_results.log
log_file_level = DEBUG
